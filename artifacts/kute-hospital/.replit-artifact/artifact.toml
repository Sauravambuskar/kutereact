kind = "web"
previewPath = "/"
title = "Kute Hospital"
version = "1.0.0"
id = "artifacts/kute-hospital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24792

[services.development]
run = "pnpm --filter @workspace/kute-hospital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kute-hospital", "run", "build" ]
publicDir = "artifacts/kute-hospital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24792"
BASE_PATH = "/"
